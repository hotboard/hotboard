[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotboard-huxiu"
version = "0.0.1"
description = "虎嗅 24 小时"
requires-python = ">=3.12"
dependencies = [
    "hotboard-core>=0.0.1",
    "typer",
]
authors = [
    {name = "llnancy"}
]
license = "Apache-2.0"
readme = "README.md"

[project.urls]
Homepage = "https://github.com/hotboard/hotboard"
Repository = "https://github.com/hotboard/hotboard"
Issues = "https://github.com/hotboard/hotboard/issues"

[project.scripts]
hotboard-huxiu = "main:run"

[tool.setuptools]
py-modules = ["main"]
