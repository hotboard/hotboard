[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotboard-nytimes"
version = "0.1.0"
description = "纽约时报"
requires-python = ">=3.12"
dependencies = [
    "hotboard-core>=0.1.0",
    "typer",
]
authors = [
    {name = "llnancy"}
]
license = {text = "Apache-2.0"}


[project.urls]
Homepage = "https://github.com/hotboard/hotboard"
Repository = "https://github.com/hotboard/hotboard"
Issues = "https://github.com/hotboard/hotboard/issues"

[project.scripts]
hotboard-nytimes = "hotboard.nytimes.main:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["hotboard.nytimes*"]

[tool.setuptools.package-dir]
"hotboard.nytimes" = "."
