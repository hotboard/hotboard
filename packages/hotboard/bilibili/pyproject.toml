[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotboard-bilibili"
version = "0.1.0"
description = "B 站热榜"
requires-python = ">=3.12"
dependencies = [
    "hotboard-core>=0.1.0",
    "typer",
]
authors = [
    {name = "llnancy"}
]
license = {text = "Apache-2.0"}


[project.urls]
Homepage = "https://github.com/hotboard/hotboard"
Repository = "https://github.com/hotboard/hotboard"
Issues = "https://github.com/hotboard/hotboard/issues"

[project.scripts]
hotboard-bilibili = "hotboard.bilibili.main:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["hotboard.bilibili*"]

[tool.setuptools.package-dir]
"hotboard.bilibili" = "."
