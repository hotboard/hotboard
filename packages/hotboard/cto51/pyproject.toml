[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotboard-cto51"
version = "0.1.0"
description = "51CTO 推荐榜数据获取工具"
requires-python = ">=3.12"
dependencies = [
    "hotboard-core>=0.1.0",
    "typer",
]
authors = [
    {name = "llnancy"}
]
license = {text = "Apache-2.0"}


[project.urls]
Homepage = "https://github.com/hotboard/hotboard"
Repository = "https://github.com/hotboard/hotboard"
Issues = "https://github.com/hotboard/hotboard/issues"

[project.scripts]
hotboard-cto51 = "hotboard.cto51.main:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["hotboard.cto51*"]

[tool.setuptools.package-dir]
"hotboard.cto51" = "."
