[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotboard-v2ex"
version = "0.1.0"
description = "V2EX 主题榜"
requires-python = ">=3.12"
dependencies = [
    "hotboard-core>=0.1.0",
    "typer",
]
authors = [
    {name = "llnancy"}
]
license = {text = "Apache-2.0"}


[project.urls]
Homepage = "https://github.com/hotboard/hotboard"
Repository = "https://github.com/hotboard/hotboard"
Issues = "https://github.com/hotboard/hotboard/issues"

[project.scripts]
hotboard-v2ex = "hotboard.v2ex.main:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["hotboard.v2ex*"]

[tool.setuptools.package-dir]
"hotboard.v2ex" = "."
