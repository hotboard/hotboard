name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install black ruff isort pyright

    - name: Check code formatting
      run: |
        black --check .
        isort --check .

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Type check
      run: |
        pyright src
      continue-on-error: true
